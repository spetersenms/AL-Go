name: Retry Upload Artifact
author: Microsoft Corporation
description: |
  Wraps actions/upload-artifact with up to 3 attempts and exponential backoff
  to mitigate transient `Failed to FinalizeArtifact: Unable to make request: ETIMEDOUT`
  errors that intermittently affect repos with many parallel jobs.
  Inputs mirror actions/upload-artifact so this action is a drop-in replacement.
inputs:
  shell:
    description: Shell to use for retry/sleep steps (powershell or pwsh)
    required: false
    default: powershell
  name:
    description: Artifact name (mirrors actions/upload-artifact)
    required: true
  path:
    description: A file, directory or wildcard pattern that describes what to upload (mirrors actions/upload-artifact)
    required: true
  if-no-files-found:
    description: 'The behavior if no files are found at the path: warn, error, or ignore (mirrors actions/upload-artifact, default: warn)'
    required: false
    default: warn
  retention-days:
    description: Duration in days the artifact will be retained (mirrors actions/upload-artifact). 0 uses the repository default.
    required: false
    default: '0'
  compression-level:
    description: 'The level of compression for Zlib (0-9). Mirrors actions/upload-artifact (default: 6).'
    required: false
    default: '6'
  overwrite:
    description: Whether to overwrite an existing artifact with the same name (mirrors actions/upload-artifact).
    required: false
    default: 'false'
  include-hidden-files:
    description: Whether to include files that begin with a dot (mirrors actions/upload-artifact).
    required: false
    default: 'false'
  initialBackoffSeconds:
    description: Seconds to sleep after the first failed upload before retrying.
    required: false
    default: '30'
  maxBackoffSeconds:
    description: Maximum seconds to sleep between retries (the second retry doubles the first delay, capped here).
    required: false
    default: '120'
outputs:
  artifact-id:
    description: GitHub ID of the uploaded artifact (whichever attempt succeeded)
    value: ${{ steps.uploadAttempt3.outputs.artifact-id || steps.uploadAttempt2.outputs.artifact-id || steps.uploadAttempt1.outputs.artifact-id }}
  artifact-url:
    description: URL of the uploaded artifact (whichever attempt succeeded)
    value: ${{ steps.uploadAttempt3.outputs.artifact-url || steps.uploadAttempt2.outputs.artifact-url || steps.uploadAttempt1.outputs.artifact-url }}
  artifact-digest:
    description: SHA-256 digest of the uploaded artifact (whichever attempt succeeded)
    value: ${{ steps.uploadAttempt3.outputs.artifact-digest || steps.uploadAttempt2.outputs.artifact-digest || steps.uploadAttempt1.outputs.artifact-digest }}
runs:
  using: composite
  steps:
    - name: Upload artifact (attempt 1/3)
      id: uploadAttempt1
      continue-on-error: true
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        retention-days: ${{ inputs.retention-days }}
        compression-level: ${{ inputs.compression-level }}
        overwrite: ${{ inputs.overwrite }}
        include-hidden-files: ${{ inputs.include-hidden-files }}

    - name: Wait before retry (after attempt 1)
      if: steps.uploadAttempt1.outcome == 'failure'
      shell: ${{ inputs.shell }}
      env:
        _name: ${{ inputs.name }}
        _delay: ${{ inputs.initialBackoffSeconds }}
      run: |
        Write-Host "::Notice::Upload of artifact '$env:_name' failed transiently (likely a FinalizeArtifact/ETIMEDOUT error). Retrying after $env:_delay seconds (attempt 2/3)."
        Start-Sleep -Seconds ([int]$env:_delay)

    - name: Upload artifact (attempt 2/3)
      id: uploadAttempt2
      if: steps.uploadAttempt1.outcome == 'failure'
      continue-on-error: true
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        retention-days: ${{ inputs.retention-days }}
        compression-level: ${{ inputs.compression-level }}
        overwrite: ${{ inputs.overwrite }}
        include-hidden-files: ${{ inputs.include-hidden-files }}

    - name: Wait before retry (after attempt 2)
      if: steps.uploadAttempt2.outcome == 'failure'
      shell: ${{ inputs.shell }}
      env:
        _name: ${{ inputs.name }}
        _initial: ${{ inputs.initialBackoffSeconds }}
        _max: ${{ inputs.maxBackoffSeconds }}
      run: |
        $delay = [Math]::Min([int]$env:_initial * 2, [int]$env:_max)
        Write-Host "::Notice::Upload of artifact '$env:_name' failed twice. Retrying after $delay seconds (final attempt 3/3)."
        Start-Sleep -Seconds $delay

    - name: Upload artifact (attempt 3/3, final)
      id: uploadAttempt3
      if: steps.uploadAttempt2.outcome == 'failure'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        retention-days: ${{ inputs.retention-days }}
        compression-level: ${{ inputs.compression-level }}
        overwrite: ${{ inputs.overwrite }}
        include-hidden-files: ${{ inputs.include-hidden-files }}

    - name: Note success after retry
      if: steps.uploadAttempt2.outcome == 'success' || steps.uploadAttempt3.outcome == 'success'
      shell: ${{ inputs.shell }}
      env:
        _name: ${{ inputs.name }}
      run: |
        Write-Host "::Notice::Upload of artifact '$env:_name' succeeded after retry."
branding:
  icon: upload-cloud
  color: blue
