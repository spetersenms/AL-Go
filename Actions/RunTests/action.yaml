name: Run Tests
author: Microsoft Corporation
inputs:
  shell:
    description: Shell in which you want to run the action (powershell or pwsh)
    required: false
    default: powershell
  project:
    description: Project folder
    required: false
    default: '.'
  installTestAppsJson:
    description: A path to a JSON-formatted list of test apps to run tests in
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: run
      shell: ${{ inputs.shell }}
      env:
        _project: ${{ inputs.project }}
        _installTestAppsJson: ${{ inputs.installTestAppsJson }}
      run: |
        ${{ github.action_path }}/../Invoke-AlGoAction.ps1 -ActionName "RunTests" -Action {
          ${{ github.action_path }}/RunTests.ps1 -project $ENV:_project -installTestAppsJson $ENV:_installTestAppsJson
        }
branding:
  icon: terminal
  color: blue
